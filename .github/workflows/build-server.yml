name: Build Server

on:
  push:
    tags:        
      - '*'

jobs:
  build:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v3
      with:
        versionSpec: '5.x'
    - name: Determine Version
      uses: gittools/actions/gitversion/execute@v3
      id: gitversion
    - name: Set csproj version
      run: sed -i "s,<Version>0.0.0.0</Version>,<Version>${{ steps.gitversion.outputs.MajorMinorPatch }}.0</Version>,g" BSU.Server/BSU.Server.csproj
    - name: Publish Windows
      run: dotnet publish -c Release -o publish_win BSU.Server --self-contained -r win-x64
    - name: Publish Linux
      run: dotnet publish -c Release -o publish_linux BSU.Server --self-contained -r linux-x64
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BSU.Server-Windows.exe
        path: publish_win/BSU.Server.exe
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BSU.Server-Linux.exe
        path: publish_linux/BSU.Server
